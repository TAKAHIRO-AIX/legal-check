<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チェック履歴 - 契約書リーガルチェック</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Hiragino Sans", "Meiryo", sans-serif; background: #f0f4f8; color: #333; }
    .container { max-width: 1080px; margin: 40px auto; padding: 0 24px; }
    h1 { font-size: 1.5rem; color: #1f497d; margin-bottom: 8px; text-align: center; }
    .nav { text-align: center; margin-bottom: 24px; }
    .nav a { color: #1f497d; text-decoration: none; font-size: 0.9rem; }
    .nav a:hover { text-decoration: underline; }
    .card { background: #fff; border-radius: 10px; padding: 28px 38px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    table { width: 100%; border-collapse: collapse; }
    th { background: #1f497d; color: #fff; padding: 10px 12px; text-align: left; font-size: 0.85rem; }
    td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
    tr:hover { background: #f5f8ff; }
    .btn { padding: 4px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
    .btn-view { background: #1f497d; color: #fff; }
    .btn-view:hover { background: #163a63; }
    .btn-delete { background: #e74c3c; color: #fff; }
    .btn-delete:hover { background: #c0392b; }
    .btn-new { display: inline-block; padding: 10px 24px; background: #1f497d; color: #fff; border-radius: 6px; text-decoration: none; font-size: 0.9rem; }
    .btn-new:hover { background: #163a63; }
    .empty { text-align: center; color: #888; padding: 40px; }
    /* 詳細モーダル */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto; }
    .modal-content { background: #fff; max-width: 900px; margin: 40px auto; border-radius: 10px; padding: 32px; max-height: 85vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-header h2 { color: #1f497d; font-size: 1.1rem; }
    .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #666; }
    .detail-section { margin-bottom: 16px; }
    .detail-section h3 { font-size: 0.9rem; color: #1f497d; margin-bottom: 4px; }
    .detail-section p, .detail-section pre { font-size: 0.85rem; background: #f8f9fa; padding: 8px; border-radius: 4px; white-space: pre-wrap; word-wrap: break-word; }
    .result-item { border-left: 4px solid #1f497d; padding: 8px 12px; margin-bottom: 8px; background: #fafbfc; border-radius: 4px; }
    .risk-high { border-left-color: #c00000; }
    .risk-mid { border-left-color: #ff7f00; }
    .risk-low { border-left-color: #0070c0; }
  </style>
</head>
<body>
<div class="container">
  <h1>📋 チェック履歴</h1>
  <div class="nav">
    <a href="/">← 新規チェックに戻る</a>
  </div>

  <div class="card">
    <div id="history-list">
      <p class="empty">読み込み中...</p>
    </div>
  </div>
</div>

<!-- 詳細モーダル -->
<div class="modal" id="detail-modal">
  <div class="modal-content" id="detail-content"></div>
</div>

<script>
  async function loadHistory() {
    const res = await fetch('/api/history');
    const data = await res.json();
    const container = document.getElementById('history-list');
    
    if (data.length === 0) {
      container.innerHTML = '<p class="empty">履歴がありません。<br><a href="/" class="btn-new" style="margin-top:16px;display:inline-block;">新規チェックを開始</a></p>';
      return;
    }

    let html = `<table><thead><tr><th>No.</th><th>タイトル</th><th>日時</th><th>背景（抜粋）</th><th>操作</th></tr></thead><tbody>`;
    data.forEach((item, i) => {
      const date = new Date(item.created_at).toLocaleString('ja-JP');
      const bg = (item.background || '').substring(0, 40) + ((item.background || '').length > 40 ? '...' : '');
      html += `<tr>
        <td>${item.id}</td>
        <td>${item.title || '無題'}</td>
        <td>${date}</td>
        <td>${bg}</td>
        <td>
          <button class="btn btn-view" onclick="viewDetail(${item.id})">詳細</button>
          <button class="btn btn-delete" onclick="deleteItem(${item.id})">削除</button>
        </td>
      </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  }

  async function viewDetail(id) {
    const res = await fetch(`/api/history/${id}`);
    const data = await res.json();
    
    let resultHtml = '';
    if (data.result && data.result.length > 0) {
      data.result.forEach((item, i) => {
        const riskClass = item.risk_level === '高' ? 'risk-high' : item.risk_level === '中' ? 'risk-mid' : 'risk-low';
        resultHtml += `<div class="result-item ${riskClass}">
          <strong>【${i+1}】${item.clause}（ページ${item.page}）リスク: ${item.risk_level}</strong><br>
          問題点: ${item.issue}<br>
          推奨: ${item.recommendation}
        </div>`;
      });
    }

    let primaryHtml = '';
    if (data.primary_docs) {
      data.primary_docs.forEach(d => {
        primaryHtml += `<p><strong>${d.desc}:</strong> ${d.text}</p>`;
      });
    }

    let secondaryHtml = '';
    if (data.secondary_docs) {
      data.secondary_docs.forEach(d => {
        secondaryHtml += `<p><strong>${d.desc}:</strong> ${d.text}</p>`;
      });
    }

    const content = document.getElementById('detail-content');
    content.innerHTML = `
      <div class="modal-header">
        <h2>${data.title || '無題'} - ${new Date(data.created_at).toLocaleString('ja-JP')}</h2>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="detail-section"><h3>① 背景・経緯</h3><p>${data.background || '未入力'}</p></div>
      <div class="detail-section"><h3>② 注目点・希望</h3><p>${data.focus || '未入力'}</p></div>
      <div class="detail-section"><h3>③ 活用方法</h3><p>${data.usage_method || '未入力'}</p></div>
      <div class="detail-section"><h3>④ 出力条件</h3><p>${data.output_indicator || '未入力'}</p></div>
      <div class="detail-section"><h3>⑤ その他</h3><p>${data.other_context || '未入力'}</p></div>
      <div class="detail-section"><h3>STEP1 対象資料（抜粋）</h3>${primaryHtml || '<p>なし</p>'}</div>
      <div class="detail-section"><h3>STEP2 参照資料（抜粋）</h3>${secondaryHtml || '<p>なし</p>'}</div>
      <div class="detail-section"><h3>チェック結果（${data.result ? data.result.length : 0}件）</h3>${resultHtml || '<p>結果なし</p>'}</div>
      <div style="text-align:center;margin-top:16px;">
        <a href="/" class="btn-new">この内容で再チェック</a>
      </div>
    `;
    document.getElementById('detail-modal').style.display = 'block';
  }

  function closeModal() {
    document.getElementById('detail-modal').style.display = 'none';
  }

  async function deleteItem(id) {
    if (!confirm('この履歴を削除しますか？')) return;
    await fetch(`/api/history/${id}`, { method: 'DELETE' });
    loadHistory();
  }

  // モーダル外クリックで閉じる
  document.getElementById('detail-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  loadHistory();
</script>
</body>
</html>
